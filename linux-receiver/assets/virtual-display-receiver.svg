<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Monitor body -->
  <rect x="12" y="14" width="104" height="72" rx="6" ry="6" fill="#1e1e2e" stroke="#89b4fa" stroke-width="3"/>
  <!-- Screen bezel -->
  <rect x="18" y="20" width="92" height="60" rx="3" ry="3" fill="#11111b"/>
  <!-- Signal waves on screen -->
  <path d="M48 42 Q64 22 80 42" stroke="#89b4fa" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.4"/>
  <path d="M52 50 Q64 34 76 50" stroke="#89b4fa" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.65"/>
  <path d="M56 58 Q64 46 72 58" stroke="#89b4fa" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.85"/>
  <!-- Signal dot -->
  <circle cx="64" cy="62" r="4" fill="#a6e3a1"/>
  <!-- Stand neck -->
  <rect x="52" y="86" width="24" height="10" rx="2" ry="2" fill="#1e1e2e" stroke="#89b4fa" stroke-width="2"/>
  <!-- Stand base -->
  <rect x="38" y="96" width="52" height="8" rx="4" ry="4" fill="#1e1e2e" stroke="#89b4fa" stroke-width="2"/>
  <!-- Incoming arrow (stream direction) -->
  <path d="M104 10 L110 20 L98 20 Z" fill="#a6e3a1" opacity="0.8"/>
  <rect x="102" y="2" width="4" height="10" rx="1" fill="#a6e3a1" opacity="0.8"/>
</svg>
